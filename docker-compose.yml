services:
  webapp:
    image: pr.4
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8015:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s